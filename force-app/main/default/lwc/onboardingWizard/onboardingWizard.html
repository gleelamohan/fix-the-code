<template>
    <lightning-card title="Customer Onboarding Wizard" icon-name="standard:account">
        
        <div class="slds-m-around_medium">
            <template if:true={accounts}>
                <ul class="slds-m-bottom_medium">
                    <template for:each={accounts} for:item="acc">
                        <li class="slds-box slds-m-bottom_small">
                            <strong>{acc.Name}</strong> - {acc.Industry}
                        </li>
                    </template>
                </ul>
            </template>
            
            <template if:true={error}>
                <div class="slds-text-color_error">
                    Error loading accounts: {error}
                </div>
            </template>

            <lightning-button 
                variant="brand" 
                label="Process All Pending" 
                onclick={handleOnboard}>
            </lightning-button>
        </div>

    </lightning-card>
</template>
